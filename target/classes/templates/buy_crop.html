<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buy Crop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #e6f4ea;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-confirm {
            background-color: #28a745;
            color: white;
            border-radius: 20px;
            padding: 10px 30px;
            font-weight: 500;
        }
        .btn-confirm:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card p-4">
        <h3 class="text-success text-center">Confirm Your Purchase 🌾</h3>
        <hr>

        <div class="row">
            <div class="col-md-5">
                <img th:src="${crop.imageUrl}" class="img-fluid rounded"
                     onerror="this.src='https://via.placeholder.com/400x250?text=Crop+Image';">
            </div>

            <div class="col-md-7">
                <h4 th:text="${crop.cropName}">Crop Name</h4>
                <p th:text="${crop.description}">Crop description here...</p>
                <p><strong>Price:</strong> ₹<span th:text="${crop.price}"></span> /kg</p>
                <p><strong>Available:</strong> <span th:text="${crop.quantity}"></span> kg</p>

                <!-- ✅ Updated form action for checkout -->
                <form th:action="@{/buyer/checkout/{cropId}(cropId=${crop.id})}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Enter Quantity to Buy (kg)</label>
                        <input type="number" name="quantity" class="form-control" th:min="1" th:max="${crop.quantity}" required>
                    </div>
                    <button type="submit" class="btn-confirm">Proceed to Checkout</button>
                    <a href="/buyer/available-crops" class="btn btn-outline-secondary ms-2">Cancel</a>
                </form>

                <!-- Error message if quantity is not available -->
                <p class="text-danger mt-3" th:if="${error}" th:text="${error}"></p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
