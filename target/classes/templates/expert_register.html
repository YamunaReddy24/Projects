<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Expert Registration | AgriLink</title>
  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: #f6fff8; 
      color: #333; 
      text-align: center;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .form-container { 
      width: 420px; 
      padding: 30px; 
      background: rgba(255, 255, 255, 0.95); 
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
    }
    input { 
      width: 90%; 
      padding: 12px; 
      margin: 10px 0; 
      border: 1px solid #ccc; 
      border-radius: 8px;
      font-size: 16px;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #2e7d32, #1b5e20); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover { 
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      transform: scale(1.02);
    }
    .nav-link { display: block; margin-top: 15px; color: #2e7d32; text-decoration: none; font-weight: 500; }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>👨‍🌾 Expert Registration</h2>
    <form th:action="@{/expert/register}" method="post" th:object="${expert}">
      <input type="text" th:field="*{name}" placeholder="Full Name" required>
      <input type="email" th:field="*{email}" placeholder="Email" required>
      <input type="password" th:field="*{password}" placeholder="Password" required>
      <input type="text" th:field="*{phone}" placeholder="Phone" required>
      <input type="text" th:field="*{specialization}" placeholder="Specialization (e.g., Crop Science)" required>
      <input type="text" th:field="*{experience}" placeholder="Experience (e.g., 5 Years)" required>
      <button type="submit">Register</button>
    </form>
    <a th:href="@{/expert/login}" class="nav-link">Already have an account? Login here</a>
    <a th:href="@{/}" class="nav-link">Back to Home</a>
  </div>
</body>
</html>
