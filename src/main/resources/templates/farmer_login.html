<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Farmer Login | AgriLink</title>
  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background-color: #f6fff8; 
      color: #333; 
      text-align: center;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .form-container { 
      width: 400px; 
      padding: 30px; 
      background: rgba(255, 255, 255, 0.95); 
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
    }
    input { 
      width: 90%; 
      padding: 12px; 
      margin: 10px 0; 
      border: 1px solid #ccc; 
      border-radius: 8px;
      font-size: 16px;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background: linear-gradient(135deg, #2e7d32, #1b5e20); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover { 
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      transform: scale(1.02);
    }
    .success { color: #2e7d32; font-weight: bold; font-size: 16px; }
    .error { color: #c62828; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>🌾 Farmer Login</h2>
    <p th:if="${successMessage}" class="success" th:text="${successMessage}"></p>
    <p th:if="${errorMessage}" class="error" th:text="${errorMessage}"></p>
    <form th:action="@{/farmer/login}" method="post" th:object="${farmer}">
      <input type="email" th:field="*{email}" placeholder="Email" required>
      <input type="password" th:field="*{password}" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
