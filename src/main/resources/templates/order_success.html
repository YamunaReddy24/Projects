<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - AgriLink</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #eaf7ea;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🌱 AgriLink</a>
            <div class="d-flex gap-2">
                <a href="/buyer/dashboard" class="btn btn-light">Dashboard</a>
                <a href="/buyer/available-crops" class="btn btn-light">Available Crops</a>
                <a href="/buyer/my-orders" class="btn btn-light">My Orders</a>
                <a href="/buyer/logout" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-lg">
                    <div class="card-body text-center p-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
                        </div>
                        <h2 class="text-success mb-3">Order Placed Successfully!</h2>

                        <div class="mb-4 p-4 bg-light rounded">
                            <p class="fs-5 mb-2">
                                <strong>Order ID:</strong> <span class="text-success" th:text="${order.orderId}"></span>
                            </p>
                            <p class="fs-5 mb-0">
                                <strong>Payment Method:</strong> <span th:text="${order.paymentMethod}"></span>
                            </p>
                        </div>

                        <p class="lead mb-4">Thank you for shopping with us.</p>

                        <div class="d-grid gap-2">
                            <a href="/buyer/my-orders" class="btn btn-success btn-lg">
                                <i class="bi bi-geo-alt"></i> Track Order
                            </a>
                            <a href="/" class="btn btn-outline-success btn-lg">
                                <i class="bi bi-house"></i> Go Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
