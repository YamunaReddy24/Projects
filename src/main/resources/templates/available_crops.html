<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Crops</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #a8d5a2;
            font-family: 'Poppins', sans-serif;
        }

        h3 {
            color: #155724;
            font-weight: bold;
            margin-top: 20px;
        }

        .crop-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            height: 100%;
        }

        .crop-card:hover {
            transform: translateY(-5px);
        }

        .crop-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .card-body {
            text-align: center;
            padding: 15px;
        }

        .btn-buy {
            background-color: #28a745;
            color: white;
            border-radius: 20px;
            font-weight: 500;
            padding: 8px 20px;
            text-decoration: none;
        }

        .btn-buy:hover {
            background-color: #218838;
            color: white;
        }

        .navbar {
            background-color: #1f7a1f;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }

        .top-buttons a {
            color: white;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">AgriLink - Available Crops</a>
        <div class="top-buttons">
            <a href="/buyer/dashboard" class="btn btn-outline-light me-2">Back to Dashboard</a>
            <a href="/buyer/logout" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="text-center">🌾 Available Crops from Farmers 🌾</h3>
    <hr>

    <!-- If no crops available -->
    <div class="row" th:if="${#lists.isEmpty(crops)}">
        <div class="col text-center">
            <p>No crops available right now.</p>
        </div>
    </div>

    <!-- Display crops: 4 per row -->
    <div class="row row-cols-1 row-cols-md-4 g-4" th:if="${!#lists.isEmpty(crops)}">
        <div class="col" th:each="crop : ${crops}">
            <div class="crop-card h-100">
                <img th:src="${crop.imageUrl}" alt="Crop Image" 
                     onerror="this.src='https://via.placeholder.com/300x180?text=Crop+Image';">
                <div class="card-body">
                    <h5 class="card-title" th:text="${crop.cropName}">Crop Name</h5>
                    <p class="text-muted" th:text="${crop.description}">Description</p>
                    <p><strong>Qty:</strong> <span th:text="${crop.quantity}"></span> kg</p>
                    <p><strong>Price:</strong> ₹<span th:text="${crop.price}"></span> /kg</p>
                    <a th:href="@{/buyer/buy/{id}(id=${crop.id})}" class="btn-buy">Buy Now</a>
                    
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
