<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Market Price Dashboard - AgriLink</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: #eaf7ea;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">📊 Market Price Analytics</a>
            <div class="d-flex gap-2">
                <a href="/market/dashboard" class="btn btn-light">Dashboard</a>
                <a href="/market/comparison" class="btn btn-light">Price Comparison</a>
                <a href="/" class="btn btn-outline-light">Home</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-4 text-success">Market Price Dashboard</h1>

        <div class="row mb-4">
            <h3 class="text-success mb-3">Current Market Prices</h3>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-success">
                        <tr>
                            <th>Crop Name</th>
                            <th>Market Price (per quintal)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="price : ${currentPrices}">
                            <td th:text="${price.cropName}"></td>
                            <td th:text="'₹ ' + ${price.marketPrice}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row mb-4">
            <h3 class="text-success mb-3">Top 5 Crops by Price</h3>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="table-success">
                        <tr>
                            <th>Rank</th>
                            <th>Crop Name</th>
                            <th>Market Price (per quintal)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="crop, iterStat : ${topCrops}">
                            <td th:text="${iterStat.index + 1}"></td>
                            <td th:text="${crop.cropName}"></td>
                            <td th:text="'₹ ' + ${crop.marketPrice}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6 mb-4">
                <h3 class="text-success mb-3">Current Prices (Bar Chart)</h3>
                <div class="card">
                    <div class="card-body">
                        <canvas id="priceBarChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <h3 class="text-success mb-3">Price Trend (Line Chart)</h3>
                <div class="card">
                    <div class="card-body">
                        <canvas id="priceTrendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const priceTrends = /*[[${priceTrends}]]*/ {};
        const currentPrices = /*[[${currentPrices}]]*/ [];
        const labels = ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'];
        const colors = ['#2e7d32', '#43a047', '#66bb6a', '#81c784', '#a5d6a7'];
        
        const lineDatasets = [];
        let i = 0;
        for (const crop in priceTrends) {
            lineDatasets.push({
                label: crop,
                data: priceTrends[crop],
                borderColor: colors[i],
                backgroundColor: colors[i] + '20',
                tension: 0.4,
                fill: true
            });
            i++;
        }

        const lineCtx = document.getElementById('priceTrendChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: lineDatasets
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: '5-Day Price Trend'
                    }
                }
            }
        });

        const barCtx = document.getElementById('priceBarChart').getContext('2d');
        new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: currentPrices.map(p => p.cropName),
                datasets: [{
                    label: 'Current Price',
                    data: currentPrices.map(p => p.marketPrice),
                    backgroundColor: colors,
                    borderColor: colors,
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                        text: 'Current Market Prices'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
