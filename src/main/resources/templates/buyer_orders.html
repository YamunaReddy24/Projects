<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - AgriLink</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #eaf7ea;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🌱 AgriLink</a>
            <div class="d-flex gap-2">
                <a href="/buyer/dashboard" class="btn btn-light">Dashboard</a>
                <a href="/buyer/available-crops" class="btn btn-light">Available Crops</a>
                <a href="/buyer/my-orders" class="btn btn-light">My Orders</a>
                <a href="/buyer/logout" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center text-success mb-4">🛒 My Orders</h2>

        <table class="table table-bordered table-striped">
            <thead class="table-success">
                <tr>
                    <th>Order ID</th>
                    <th>Crop Name</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Order Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderId}"></td>
                    <td th:text="${order.crop.cropName}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td th:text="'₹' + ${order.totalPrice}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                    <td>
                        <span class="badge" th:classappend="${order.status.name() == 'ORDER_PLACED' ? 'bg-secondary' : 
                                                           order.status.name() == 'CONFIRMED' ? 'bg-info' : 
                                                           order.status.name() == 'SHIPPED' ? 'bg-warning' : 'bg-success'}"
                              th:text="${order.status.name().replace('_', ' ')}"></span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="text-center mt-3">
            <a href="/buyer/dashboard" class="btn btn-success">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
