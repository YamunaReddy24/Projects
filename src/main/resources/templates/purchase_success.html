<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Purchase Successful</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #e9f7ef;
            font-family: 'Poppins', sans-serif;
        }
        .success-box {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 30px;
            text-align: center;
            margin-top: 100px;
        }
        .btn-success {
            border-radius: 20px;
            padding: 8px 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-box">
        <h2 class="text-success">✅ Order Confirmed!</h2>
        <p>Your order has been placed successfully.</p>
        <hr>
        <h5>Order Details</h5>
        <p><strong>Crop Name:</strong> <span th:text="${crop.cropName}"></span></p>
        <p><strong>Quantity:</strong> <span th:text="${quantity}"></span> kg</p>
        <p><strong>Price per kg:</strong> ₹<span th:text="${crop.price}"></span></p>
        <p><strong>Total Amount:</strong> ₹<span th:text="${total}"></span></p>

        <a href="/buyer/dashboard" class="btn btn-success mt-3">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
